name: Deploy my-community to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'lecture1/my-community/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lecture1/my-community/package-lock.json

      - name: Install dependencies
        working-directory: lecture1/my-community
        run: npm ci

      - name: Build
        working-directory: lecture1/my-community
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          GITHUB_ACTIONS: true
        run: npm run build

      - name: Deploy to kobohamster/my-community
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          external_repository: kobohamster/my-community
          publish_branch: gh-pages
          publish_dir: lecture1/my-community/dist
