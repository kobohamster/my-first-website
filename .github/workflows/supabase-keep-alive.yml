name: Supabase Keep Alive

on:
  schedule:
    # 주 3회 실행 (월, 수, 금 오전 9시 UTC = 오후 6시 KST)
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Health Check
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          URL=$(echo "$SUPABASE_URL" | tr -d '[:space:]')
          KEY=$(echo "$SUPABASE_ANON_KEY" | tr -d '[:space:]')
          curl -s "${URL}/rest/v1/" \
            -H "apikey: ${KEY}" \
            -H "Authorization: Bearer ${KEY}"
          echo "Supabase ping successful!"
