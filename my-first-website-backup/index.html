<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김보옥 | 포트폴리오</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1976d2, #dc004e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .avatar {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #1976d2, #dc004e);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    h1 { font-size: 1.8rem; color: #1976d2; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 1rem; margin-bottom: 24px; }
    .message {
      background: #f5f5f5; border-radius: 8px;
      padding: 16px; color: #444; line-height: 1.6; margin-bottom: 24px;
    }
    .badge {
      display: inline-block; background: #1976d2;
      color: white; padding: 6px 16px;
      border-radius: 20px; font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👩‍💻</div>
    <h1>안녕하세요, 김보옥입니다!</h1>
    <p class="subtitle">웹 개발을 배우고 있는 학습자</p>
    <div class="message">
      React와 GitHub를 공부하며<br>
      하루하루 성장하고 있습니다. 🚀<br>
      방문해 주셔서 감사합니다!
    </div>
    <span class="badge">GitHub Pages 배포 완료</span>
  </div>
</body>
</html>
